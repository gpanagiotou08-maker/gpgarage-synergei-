function getDB() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
    return firebase.firestore();
  } catch(e) { return null; }
}

function useFirestore(col, init) {
  const [data, setData] = React.useState(function(){
    try { return JSON.parse(localStorage.getItem("fb_"+col)||JSON.stringify(init)); } catch(e) { return init; }
  });
  const [synced, setSynced] = React.useState(false);

  React.useEffect(function(){
    var db = getDB();
    if (!db) { setSynced(true); return; }
    var unsub = db.collection(col).orderBy("_ts","desc").onSnapshot(function(snap){
      var docs = snap.docs.map(function(d){ return Object.assign({},d.data(),{_fid:d.id}); });
      setData(docs);
      try { localStorage.setItem("fb_"+col, JSON.stringify(docs)); } catch(e) {}
      setSynced(true);
    }, function(){ setSynced(true); });
    return function(){ unsub(); };
  }, [col]);

  function add(entry) {
    var db = getDB();
    var full = Object.assign({}, entry, {_ts: Date.now()});
    if (db) {
      db.collection(col).add(full).catch(function(){});
    } else {
      var next = [Object.assign({},full,{_fid:String(Date.now())})].concat(data);
      setData(next);
      try { localStorage.setItem("fb_"+col, JSON.stringify(next)); } catch(e) {}
    }
  }

  return [data, add, synced];
}

function formatPlate(val) {
  const clean = val.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (clean.length > 3) return clean.slice(0,3) + '-' + clean.slice(3,7);
  return clean;
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["ΙΔΙΟΚΤΗΤΗΣ",selV.owner],["ΤΗΛΕΦΩΝΟ",selV.phone||"—"],["ΜΑΡΚΑ",(selV.brand||"")+" "+(selV.model||"")],["ΧΡΟΝΟΛΟΓΙΑ",selV.year||"—"],["ΧΡΩΜΑ",selV.color||"—"],["ΚΥΒΙΚΑ",selV.cc?selV.cc+"cc":"—"],["ΚΑΥΣΙΜΟ",selV.fuel||"—"],["ΑΡ. ΠΛΑΙΣΙΟΥ",selV.chassis||"—"],["ΑΡ. ΚΙΝΗΤΗΡΑ",selV.engine||"—"]].map(function(item){ return (
            <div key={item[0]}><div style={{fontSize:10,color:th.muted}}>{item[0]}</div><div style={{fontSize:13,fontWeight:700}}>{item[1]}</div></div>
          ); })}
        </div>
        {selV.notes && <div style={{fontSize:12,color:th.muted,marginTop:8,paddingTop:8,borderTop:"1px solid "+th.border}}>{selV.notes}</div>}
      </div>
      <button style={{...s.btn(th.red),marginBottom:14}} onClick={()=>setScreen("newService")}>+ Νέα Εργασία</button>
      <div style={s.sectionTitle}>ΙΣΤΟΡΙΚΟ ({vServices.length})</div>
      {vServices.length===0 && <div style={{...s.card,textAlign:"center",color:th.muted,padding:24}}>Δεν υπάρχουν εργασίες</div>}
      {vServices.map(function(sv){ return (
        <div key={sv.id} style={{...s.card,borderLeft:"3px solid "+(sv.status==="Σε εξέλιξη"?th.accent:sv.status==="Ολοκληρώθηκε"?th.green:th.muted)}}>
          <div style={s.row}>
            <div style={{fontSize:14,fontWeight:800}}>{sv.type}</div>
            <span style={s.pill(sv.status==="Σε εξέλιξη"?th.accent:sv.status==="Ολοκληρώθηκε"?th.green:th.muted)}>{sv.status}</span>
          </div>
          <div style={{fontSize:11,color:th.muted,marginTop:2}}>📅 {sv.date}{sv.km?" · "+sv.km+" χλμ":""}</div>
          {sv.desc && <div style={{fontSize:12,marginTop:6}}>{sv.desc}</div>}
          {sv.parts && <div style={{fontSize:11,color:th.muted,marginTop:3}}>🔩 {sv.parts}</div>}
          {sv.mechanic && <div style={{fontSize:11,color:th.muted,marginTop:2}}>👤 {sv.mechanic}</div>}
          {sv.cost>0 && <div style={{fontSize:15,fontWeight:900,color:th.green,marginTop:6}}>{sv.cost}€</div>}
        </div>
      ); })}
    </div>
  );

  if (screen==="newService") return (
    <div style={{padding:"14px 16px"}}>
      <div style={{...s.row,marginBottom:14}}>
        <div>
          <div style={{fontSize:16,fontWeight:800,color:th.red}}>🔧 Νέα Εργασία</div>
          <div style={{fontSize:12,color:th.muted}}>{selV&&selV.plate} · {selV&&selV.owner}</div>
        </div>
        <button style={s.btnSm(th.muted)} onClick={()=>setScreen("vehicle")}>← Πίσω</button>
      </div>
      <div style={s.label}>ΤΥΠΟΣ ΕΡΓΑΣΙΑΣ</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
        {SERVICE_TYPES.map(function(t){ return (
          <button key={t} style={s.selBtn(newS.type===t,th.red)} onClick={()=>setNewS({...newS,type:t})}>{t}</button>
        ); })}
      </div>
      <input style={s.input} placeholder="Χιλιόμετρα" type="number" value={newS.km} onChange={e=>setNewS({...newS,km:e.target.value})}/>
      <textarea style={{...s.input,minHeight:70,resize:"vertical"}} placeholder="Περιγραφή εργασιών..." value={newS.desc} onChange={e=>setNewS({...newS,desc:e.target.value})}/>
      <input style={s.input} placeholder="Ανταλλακτικά" value={newS.parts} onChange={e=>setNewS({...newS,parts:e.target.value})}/>
      <input style={s.input} placeholder="Μηχανικός" value={newS.mechanic} onChange={e=>setNewS({...newS,mechanic:e.target.value})}/>
      <input style={s.input} placeholder="Κόστος €" type="number" value={newS.cost} onChange={e=>setNewS({...newS,cost:e.target.value})}/>
      <div style={s.label}>ΚΑΤΑΣΤΑΣΗ</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
        {["Σε εξέλιξη","Ολοκληρώθηκε","Αναμονή"].map(function(st){ return (
          <button key={st} style={s.selBtn(newS.status===st,th.blue)} onClick={()=>setNewS({...newS,status:st})}>{st}</button>
        ); })}
      </div>
      <button style={s.btn(th.green)} onClick={saveS}>✓ Αποθήκευση</button>
    </div>
  );

  return (
    <div style={{padding:"14px 16px"}}>
      <input style={s.input} placeholder="🔍 Αναζήτηση πινακίδα, ιδιοκτήτης..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <button style={{...s.btn(th.red),marginBottom:14}} onClick={()=>{setScreen("newVehicle");setDupWarn("");}}>+ Νέο Όχημα</button>
      <div style={s.sectionTitle}>ΟΧΗΜΑΤΑ ({filtered.length})</div>
      {filtered.length===0 && <div style={{...s.card,textAlign:"center",color:th.muted,padding:30}}>{search?"Δεν βρέθηκαν":"Δεν υπάρχουν οχήματα"}</div>}
      {filtered.map(function(v){
        var vs = services.filter(function(sv){ return sv.vehicleId===v.id; });
        var active = vs.filter(function(sv){ return sv.status==="Σε εξέλιξη"; }).length;
        return (
          <div key={v.id} style={{...s.card,borderLeft:"3px solid "+(active>0?th.accent:th.border),cursor:"pointer"}} onClick={()=>{setSelV(v);setScreen("vehicle");}}>
            <div style={s.row}>
              <div>
                <div style={{fontSize:15,fontWeight:800,letterSpacing:1}}>{v.plate}</div>
                <div style={{fontSize:12,color:th.muted}}>{v.brand} {v.model} {v.year}</div>
                <div style={{fontSize:12,color:th.muted}}>👤 {v.owner}{v.phone?" · 📞 "+v.phone:""}</div>
              </div>
              <div style={{textAlign:"right"}}>
                {active>0 && <span style={s.pill(th.accent)}>{active} ενεργές</span>}
                <div style={{fontSize:11,color:th.muted,marginTop:4}}>{vs.length} εργασίες</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── ΕΚΘΕΣΗ ──
function Ekthesi({ tamio }) {
  const now2 = new Date();
  const [selMonth, setSelMonth] = useState(now2.getMonth());
  const selYear = now2.getFullYear();
  var mm = String(selMonth+1).padStart(2,"0");

  var monthTamio = tamio.filter(function(e){ return e.date && e.date.slice(3,5)===mm && e.date.slice(6)===String(selYear); });
  var esoda = monthTamio.filter(function(e){ return e.type==="Είσπραξη"; }).reduce(function(s,e){ return s+e.amount; },0);
  var exoda = monthTamio.filter(function(e){ return e.type==="Έξοδο"||e.type==="Προμήθεια"; }).reduce(function(s,e){ return s+e.amount; },0);
  var profit = esoda - exoda;

  var incByCat = {};
  monthTamio.filter(function(e){ return e.type==="Είσπραξη"; }).forEach(function(e){
    var k = (e.cat && e.cat!=="Είσπραξη") ? e.cat : "Άλλο";
    incByCat[k] = (incByCat[k]||0) + e.amount;
  });

  var expByCat = {};
  monthTamio.filter(function(e){ return e.type==="Έξοδο"; }).forEach(function(e){
    expByCat[e.cat] = (expByCat[e.cat]||0) + e.amount;
  });

  var incByMethod = {};
  monthTamio.filter(function(e){ return e.type==="Είσπραξη"; }).forEach(function(e){
    incByMethod[e.payMethod] = (incByMethod[e.payMethod]||0) + e.amount;
  });
  var fees = monthTamio.filter(function(e){ return e.type==="Προμήθεια"; }).reduce(function(s,e){ return s+e.amount; },0);

  return (
    <div style={{padding:"14px 16px"}}>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",scrollbarWidth:"none"}}>
        {MONTHS.map(function(m,i){ return (
          <button key={i} style={s.tab(selMonth===i)} onClick={()=>setSelMonth(i)}>{m}</button>
        ); })}
      </div>

      <div style={{...s.card,borderLeft:"4px solid "+(profit>=0?th.green:th.red),marginBottom:14}}>
        <div style={{fontSize:11,color:th.muted,marginBottom:6,letterSpacing:1}}>ΑΠΟΤΕΛΕΣΜΑ — {MONTHS[selMonth]} {selYear}</div>
        <div style={{fontSize:32,fontWeight:900,color:profit>=0?th.green:th.red}}>{profit.toLocaleString()}€</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
          <div style={{background:"#1e1e2a",borderRadius:10,padding:10}}>
            <div style={{fontSize:10,color:th.muted}}>ΕΣΟΔΑ</div>
            <div style={{fontSize:18,fontWeight:800,color:th.green}}>+{esoda.toLocaleString()}€</div>
          </div>
          <div style={{background:"#1e1e2a",borderRadius:10,padding:10}}>
            <div style={{fontSize:10,color:th.muted}}>ΕΞΟΔΑ</div>
            <div style={{fontSize:18,fontWeight:800,color:th.red}}>-{exoda.toLocaleString()}€</div>
          </div>
        </div>
      </div>

      {Object.keys(incByCat).length>0 && (
        <>
          <div style={s.sectionTitle}>ΕΣΟΔΑ ΑΝΑ ΚΑΤΗΓΟΡΙΑ</div>
          <div style={s.card}>
            {Object.entries(incByCat).sort(function(a,b){ return b[1]-a[1]; }).map(function(item){ return (
              <div key={item[0]} style={{...s.row,marginBottom:8}}>
                <span style={{fontSize:13}}>{item[0]}</span>
                <span style={{fontSize:14,fontWeight:800,color:th.green}}>+{item[1].toLocaleString()}€</span>
              </div>
            ); })}
          </div>
        </>
      )}

      {Object.keys(incByMethod).length>0 && (
        <>
          <div style={s.sectionTitle}>ΕΣΟΔΑ ΑΝΑ ΤΡΟΠΟ ΠΛΗΡΩΜΗΣ</div>
          <div style={s.card}>
            {Object.entries(incByMethod).map(function(item){ return (
              <div key={item[0]} style={{...s.row,marginBottom:8}}>
                <span style={{fontSize:13}}>{item[0]==="Κάρτα"?"💳":item[0]==="Κατάθεση"?"🏦":item[0]==="Επί Πίστωση"?"📋":"💵"} {item[0]}</span>
                <span style={{fontSize:14,fontWeight:800,color:th.green}}>+{item[1].toLocaleString()}€</span>
              </div>
            ); })}
            {fees>0 && (
              <div style={{...s.row,marginBottom:8}}>
                <span style={{fontSize:13}}>Προμήθειες κάρτας</span>
                <span style={{fontSize:14,fontWeight:800,color:th.red}}>-{fees.toFixed(2)}€</span>
              </div>
            )}
          </div>
        </>
      )}

      {Object.keys(expByCat).length>0 && (
        <>
          <div style={s.sectionTitle}>ΕΞΟΔΑ ΑΝΑ ΚΑΤΗΓΟΡΙΑ</div>
          <div style={s.card}>
            {Object.entries(expByCat).sort(function(a,b){ return b[1]-a[1]; }).map(function(item){ return (
              <div key={item[0]} style={{...s.row,marginBottom:8}}>
                <span style={{fontSize:13}}>{item[0]}</span>
                <span style={{fontSize:14,fontWeight:800,color:th.red}}>-{item[1].toLocaleString()}€</span>
              </div>
            ); })}
          </div>
        </>
      )}

      {monthTamio.length===0 && <div style={{...s.card,textAlign:"center",color:th.muted,padding:30}}>Δεν υπάρχουν εγγραφές για αυτό τον μήνα</div>}
    </div>
  );
}

// ── APP ──
function App() {
  const [screen, setScreen] = useState("dashboard");
  const [tamio, addTamio, tamioSync] = useFirestore("syn_tamio", []);
  const [vehicles, addVehicle, vSync] = useFirestore("syn_vehicles", []);
  const [services, addService, sSync] = useFirestore("syn_services", []);
  const synced = tamioSync && vSync && sSync;

  var nav = [
    {k:"dashboard",icon:"🏠",label:"Αρχική"},
    {k:"tamio",icon:"💰",label:"Ταμείο"},
    {k:"vehicles",icon:"🚗",label:"Οχήματα"},
    {k:"ekthesi",icon:"📊",label:"Έκθεση"},
  ];

  return (
    <div style={{minHeight:"100vh",background:th.bg,color:th.text,fontFamily:"Segoe UI,system-ui,sans-serif"}}>
      <style>{`
        .gp-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .gp-header { background: linear-gradient(135deg,#0d0d1f,#050508); border-bottom: 3px solid #cc2222; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
        .gp-body { display: flex; flex: 1; }
        .gp-sidebar { display: none; }
        .gp-content { flex: 1; max-width: 430px; margin: 0 auto; padding-bottom: 80px; width: 100%; }
        .gp-bottomnav { position: fixed; bottom: 0; left: 0; right: 0; background: #0d0d14; border-top: 1px solid #2a2a3a; display: flex; justify-content: space-around; padding: 8px 0; z-index: 100; }
        .gp-navitem { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; font-size: 10px; padding: 4px 8px; background: none; border: none; font-family: inherit; }
        @media (min-width: 768px) {
          .gp-content { max-width: 100%; padding-bottom: 20px; padding-right: 20px; }
          .gp-sidebar { display: flex; flex-direction: column; width: 200px; min-height: calc(100vh - 65px); background: #0d0d14; border-right: 1px solid #2a2a3a; padding: 20px 0; flex-shrink: 0; }
          .gp-bottomnav { display: none; }
          .gp-sidenav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 600; background: none; border: none; width: 100%; text-align: left; font-family: inherit; transition: background 0.15s; }
          .gp-sidenav-item:hover { background: #1e1e2a; }
          .gp-inner { max-width: 800px; }
        }
        @media (min-width: 1200px) {
          .gp-inner { max-width: 1000px; }
        }
      `}</style>

      <div className="gp-layout">
        {/* Header */}
        <div className="gp-header">
          <img src={"data:image/png;base64,"+LOGO_B64} style={{height:38,objectFit:"contain"}} alt="GP Garage"/>
          <span style={{background:synced?"#cc2222":"#f5a62322",color:synced?"#fff":"#f5a623",fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:20}}>{synced?"🟢 LIVE":"⏳..."}</span>
        </div>

        <div className="gp-body">
          {/* Sidebar — desktop μόνο */}
          <div className="gp-sidebar">
            {nav.map(function(n){
              var active = screen===n.k;
              return (
                <button key={n.k} className="gp-sidenav-item" style={{color:active?"#cc2222":th.muted,borderLeft:active?"3px solid #cc2222":"3px solid transparent"}} onClick={()=>setScreen(n.k)}>
                  <span style={{fontSize:20}}>{n.icon}</span>
                  <span>{n.label}</span>
                </button>
              );
            })}
          </div>

          {/* Content */}
          <div className="gp-content">
            <div className="gp-inner">
              {screen==="dashboard" && <Dashboard tamio={tamio}/>}
              {screen==="tamio" && <Tamio tamio={tamio} addTamio={addTamio}/>}
              {screen==="vehicles" && <Vehicles vehicles={vehicles} addVehicle={addVehicle} services={services} addService={addService}/>}
              {screen==="ekthesi" && <Ekthesi tamio={tamio}/>}
            </div>
          </div>
        </div>

        {/* Bottom nav — mobile μόνο */}
        <div className="gp-bottomnav">
          {nav.map(function(n){
            var active = screen===n.k;
            return (
              <button key={n.k} className="gp-navitem" style={{color:active?"#cc2222":th.muted,fontWeight:active?700:500}} onClick={()=>setScreen(n.k)}>
                <span style={{fontSize:20}}>{n.icon}</span>
                <span>{n.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
